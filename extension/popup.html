<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Deepfake Detector</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <h3>Deepfake Detector</h3>
  <div class="row row--check">
    <input type="checkbox" id="enabledToggle" />
    <label for="enabledToggle">Enable realtime scanning</label>
  </div>
  <div class="row">
    <label for="modeSelect">Performance mode</label>
    <select id="modeSelect">
      <option value="balanced">Balanced</option>
      <option value="quality">Quality</option>
      <option value="fast">Fast</option>
    </select>
  </div>
  <div class="row">
    <button type="button" id="rescanBtn">Rescan tab now</button>
  </div>
  <p id="status"></p>
  <script type="module" src="popup.mjs"></script>
</body>
</html>
